            font-size: 1.1rem;
            color: #1e2a3a;
            letter-spacing: 0.5px;

            font-size: 1.2rem;

            position: relative;
            background: #0a1a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            width: 100%;
            height: 1000px;
        }

            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            transition: transform 0.5s ease;
        }
        .video-card:hover .video-container video {
            transform: scale(1.02);
        }
        /* Water ripple overlay effect */
        .video-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 0%, rgba(52,152,219,0.15) 100%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .video-card:hover .video-container::after {
            opacity: 1;
        }

            0% { box-shadow: 0 0 0 0 rgba(243,156,18,0); }
            50% { box-shadow: 0 0 0 8px rgba(243,156,18,0.2); }

            }
            .video-container {

        @media (max-width: 750px) {

            .close-icon { top: 20px; right: 20px; width: 45px; height: 45px; font-size: 2rem; }

                font-size: 0.85rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>

                ${data.sections.experience.cards.map(card => `
                    <div class="exp-card">
                        <h3>${card.title}</h3>
                        <ul>${card.items.map(item => `<li>${item}</li>`).join('')}</ul>
                    </div>
                `).join('')}
            </div>`;
        container.appendChild(expSection);

        // Education
        const eduSection = document.createElement('div');
        eduSection.className = 'cv-section';
        eduSection.innerHTML = `<h2><i class="fas fa-graduation-cap"></i> ${data.sections.education.title}</h2>
            <p>${data.sections.education.text}</p>`;
        container.appendChild(eduSection);

        // Skills
        const skillsSection = document.createElement('div');
        skillsSection.className = 'cv-section';
        skillsSection.innerHTML = `<h2><i class="fas fa-cogs"></i> ${data.sections.skills.title}</h2>
            <div class="skills-wrapper">
                <div class="skills-col"><h3>${data.sections.skills.technical}</h3>${data.sections.skills.techItems.map(s => `<span class="badge-skill">${s}</span>`).join('')}</div>
                <div class="skills-col"><h3>${data.sections.skills.soft}</h3>${data.sections.skills.softItems.map(s => `<span class="badge-skill">${s}</span>`).join('')}</div>
            </div>`;
        container.appendChild(skillsSection);

        // Insert two videos with FIXED SIZE 800x1000 only once
        if (!videosInserted) {
            const videoPlaceholder = document.getElementById('videoPlaceholder');
            const wrapper = document.createElement('div');
            wrapper.className = 'videos-wrapper';

            // Video 1 card
            const card1 = document.createElement('div');
            card1.className = 'video-card';
            const label1 = document.createElement('div');
            label1.className = 'video-label';
            label1.innerHTML = '<i class="fas fa-water"></i> 🏊‍♂️ Advanced Swimming Techniques <i class="fas fa-fish"></i>';
            const videoDiv1 = document.createElement('div');
            videoDiv1.className = 'video-container';
            const videoElem1 = document.createElement('video');
            videoElem1.src = 'video1.mp4';
            videoElem1.autoplay = true;
            videoElem1.loop = true;
            videoElem1.muted = true;
            videoElem1.playsInline = true;
            videoElem1.setAttribute('playsinline', '');
            videoDiv1.appendChild(videoElem1);
            card1.appendChild(label1);
            card1.appendChild(videoDiv1);
            wrapper.appendChild(card1);

            // Video 2 card
            const card2 = document.createElement('div');
            card2.className = 'video-card';
            const label2 = document.createElement('div');
            label2.className = 'video-label';
            label2.innerHTML = '<i class="fas fa-life-ring"></i> 🏊‍♀️ Lifeguard & Rescue Training <i class="fas fa-shield-alt"></i>';
            const videoDiv2 = document.createElement('div');
            videoDiv2.className = 'video-container';
            const videoElem2 = document.createElement('video');
            videoElem2.src = 'video2.mp4';
            videoElem2.autoplay = true;
            videoElem2.loop = true;
            videoElem2.muted = true;
            videoElem2.playsInline = true;
            videoElem2.setAttribute('playsinline', '');
            videoDiv2.appendChild(videoElem2);
            card2.appendChild(label2);
            card2.appendChild(videoDiv2);
            wrapper.appendChild(card2);

            videoPlaceholder.appendChild(wrapper);
            videosInserted = true;
        }

        // Add Professional Summary (About) after video placeholder
        const aboutSection = document.createElement('div');
        aboutSection.className = 'cv-section';
        aboutSection.innerHTML = `<h2><i class="fas fa-user-astronaut"></i> ${data.sections.about.title}</h2>
            <p>${data.sections.about.text}</p>`;
        const videoHolder = document.getElementById('videoPlaceholder');
        const oldAbout = document.getElementById('tempAboutSection');
        if (oldAbout) oldAbout.remove();
        aboutSection.id = 'tempAboutSection';
        videoHolder.insertAdjacentElement('afterend', aboutSection);

        // Update PDF links
        document.getElementById('pdfArabicBtn').href = `CV-Arabic.pdf`;
        document.getElementById('pdfEnglishBtn').href = `CV-English.pdf`;

        // adjust body direction and class
        if (lang === 'ar') {
            document.body.classList.add('lang-ar');
            document.body.dir = 'rtl';
            // update arabic labels
            const labels = document.querySelectorAll('.video-label');
            if (labels.length >= 2) {
                labels[0].innerHTML = '<i class="fas fa-water"></i> 🏊‍♂️ تقنيات سباحة متقدمة <i class="fas fa-fish"></i>';
                labels[1].innerHTML = '<i class="fas fa-life-ring"></i> 🏊‍♀️ تدريب إنقاذ وإسعاف <i class="fas fa-shield-alt"></i>';
            }
        } else {
            document.body.classList.remove('lang-ar');
            document.body.dir = 'ltr';
            const labels = document.querySelectorAll('.video-label');
            if (labels.length >= 2) {
                labels[0].innerHTML = '<i class="fas fa-water"></i> 🏊‍♂️ Advanced Swimming Techniques <i class="fas fa-fish"></i>';
                labels[1].innerHTML = '<i class="fas fa-life-ring"></i> 🏊‍♀️ Lifeguard & Rescue Training <i class="fas fa-shield-alt"></i>';
            }
        }
        // update active button style
        document.getElementById('lang-ar').classList.toggle('active', lang === 'ar');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        
        // Update toggle button text
        const isGalleryVisible = document.getElementById('certificatesSection').classList.contains('show');
        const icon = isGalleryVisible ? 'fa-chevron-up' : 'fa-chevron-down';
        toggleBtn.innerHTML = `<i class="fas fa-certificate"></i> <span id="certBtnText">${data.certBtn}</span> <i class="fas ${icon}"></i>`;
    }

    // Build certificate gallery (images 1..12)
    const totalImages = 12;
    const galleryGrid = document.getElementById('galleryGrid');
    for (let i = 1; i <= totalImages; i++) {
        const card = document.createElement('div');
        card.className = 'cert-card';
        const img = document.createElement('img');
        img.src = `images/${i}.jpg`;
        img.alt = `Certificate ${i}`;
        img.onerror = function() { this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150"%3E%3Crect width="200" height="150" fill="%23f3f4f6"/%3E%3Ctext x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" fill="%239ca3af" font-size="14"%3E📄 Cert %23'+i+'%3C/text%3E%3C/svg%3E'; };
        const p = document.createElement('p');
        p.innerHTML = `📜 ${currentLang === 'ar' ? `الشهادة رقم ${i}` : `Certificate #${i}`}`;
        card.appendChild(img);
        card.appendChild(p);
        card.addEventListener('click', () => openLightbox(img.src));
        galleryGrid.appendChild(card);
    }

    // Toggle certificate gallery
    const toggleBtn = document.getElementById('toggleCertBtn');
    const certSection = document.getElementById('certificatesSection');
    let isVisible = false;
    toggleBtn.addEventListener('click', () => {
        if (isVisible) {
            certSection.classList.remove('show');
            toggleBtn.innerHTML = `<i class="fas fa-certificate"></i> <span id="certBtnText">${content[currentLang].certBtn}</span> <i class="fas fa-chevron-down"></i>`;
        } else {
            certSection.classList.add('show');
            toggleBtn.innerHTML = `<i class="fas fa-certificate"></i> <span id="certBtnText">${content[currentLang].certBtn}</span> <i class="fas fa-chevron-up"></i>`;
        }
        isVisible = !isVisible;
    });

    // Lightbox functions
    const lightbox = document.getElementById('imgLightbox');
    const zoomedImg = document.getElementById('zoomedImg');
    function openLightbox(src) { zoomedImg.src = src; lightbox.classList.add('active'); document.body.style.overflow = 'hidden'; }
    function closeLightbox() { lightbox.classList.remove('active'); document.body.style.overflow = ''; zoomedImg.src = ''; }
    document.getElementById('closeLightboxBtn').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && lightbox.classList.contains('active')) closeLightbox(); });

    // Language switcher buttons
    document.getElementById('lang-ar').addEventListener('click', () => updateLanguage('ar'));
    document.getElementById('lang-en').addEventListener('click', () => updateLanguage('en'));

    // Initialize with English (US)
    updateLanguage('en');
</script>
</body>
</html>
